<div class="d3-deepseek-parameter-calculator"></div>

<style>
  .d3-deepseek-parameter-calculator {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
    color: var(--text-color);
  }

  .d3-deepseek-parameter-calculator .controls-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .d3-deepseek-parameter-calculator .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .d3-deepseek-parameter-calculator .control-group label {
    font-size: 0.8em;
    font-weight: 700;
  }

  .d3-deepseek-parameter-calculator .control-group select {
    padding: 8px 10px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--surface-bg);
    color: var(--text-color);
    font-size: 0.9em;
  }

  .d3-deepseek-parameter-calculator .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin: 0 0 16px 0;
  }

  .d3-deepseek-parameter-calculator .summary-card {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: var(--page-bg);
    padding: 12px;
    text-align: center;
  }

  .d3-deepseek-parameter-calculator .summary-title {
    font-size: 0.75em;
    color: var(--muted-color);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .d3-deepseek-parameter-calculator .summary-value {
    font-size: 1.1em;
    font-weight: 700;
    color: var(--primary-color);
  }

  .d3-deepseek-parameter-calculator .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }

  .d3-deepseek-parameter-calculator .config-item {
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px 10px;
    background: var(--surface-bg);
  }

  .d3-deepseek-parameter-calculator .config-key {
    font-size: 0.74em;
    color: var(--muted-color);
    text-transform: uppercase;
  }

  .d3-deepseek-parameter-calculator .config-value {
    font-size: 0.92em;
    font-weight: 600;
  }

  .d3-deepseek-parameter-calculator .chart-wrap {
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--page-bg);
    padding: 10px;
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .d3-deepseek-parameter-calculator .chart-tooltip {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    transform: translate(-9999px, -9999px);
    transition: opacity 0.12s ease;
    font-size: 12px;
    line-height: 1.35;
    border: 1px solid var(--border-color);
    background: var(--surface-bg);
    color: var(--text-color);
    border-radius: 8px;
    padding: 8px 10px;
    min-width: 220px;
    z-index: 8;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
  }

  .d3-deepseek-parameter-calculator svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .d3-deepseek-parameter-calculator .chart-legend {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
  }

  .d3-deepseek-parameter-calculator .chart-legend .legend-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-color);
  }

  .d3-deepseek-parameter-calculator .chart-legend .legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    justify-content: center;
  }

  .d3-deepseek-parameter-calculator .chart-legend .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-color);
    cursor: pointer;
    white-space: nowrap;
  }

  .d3-deepseek-parameter-calculator .chart-legend .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border-color);
    flex-shrink: 0;
  }

  .d3-deepseek-parameter-calculator.hovering .bar.ghost {
    opacity: 0.2;
  }

  .d3-deepseek-parameter-calculator .chart-legend .legend-item.ghost {
    opacity: 0.35;
  }
</style>

<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === "function") return cb();
      let s = document.getElementById("d3-cdn-script");
      if (!s) {
        s = document.createElement("script");
        s.id = "d3-cdn-script";
        s.src = "https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js";
        document.head.appendChild(s);
      }
      s.addEventListener(
        "load",
        () => {
          if (window.d3 && typeof window.d3.select === "function") cb();
        },
        { once: true },
      );
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (
        !(container &&
          container.classList &&
          container.classList.contains("d3-deepseek-parameter-calculator"))
      ) {
        const candidates = Array.from(
          document.querySelectorAll(".d3-deepseek-parameter-calculator"),
        ).filter((el) => !(el.dataset && el.dataset.mounted === "true"));
        container = candidates[candidates.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) {
        if (container.dataset.mounted === "true") return;
        container.dataset.mounted = "true";
      }

      container.innerHTML = `
        <div class="controls-grid">
          <div class="control-group">
            <label for="deepseek-model-select">DeepSeek model</label>
            <select id="deepseek-model-select"></select>
          </div>
        </div>
        <div class="summary-grid">
          <div class="summary-card"><div class="summary-title">Family</div><div class="summary-value" id="ds-family">-</div></div>
          <div class="summary-card"><div class="summary-title">Year</div><div class="summary-value" id="ds-year">-</div></div>
          <div class="summary-card"><div class="summary-title">Total Params</div><div class="summary-value" id="ds-total">-</div></div>
          <div class="summary-card"><div class="summary-title">Active Params</div><div class="summary-value" id="ds-active">-</div></div>
          <div class="summary-card"><div class="summary-title">Attention</div><div class="summary-value" id="ds-attention">-</div></div>
        </div>
        <div class="config-grid" id="ds-config-grid"></div>
        <div class="chart-wrap">
          <div class="chart-tooltip" id="ds-tooltip"></div>
          <svg id="ds-parts-chart"></svg>
          <div class="chart-legend" id="ds-legend">
            <div class="legend-title">Legend</div>
            <div class="legend-items" id="ds-legend-items"></div>
          </div>
        </div>
      `;

      const formatB = (n) => `${Number(n).toFixed(n >= 10 ? 1 : 2)}B`;
      const formatInt = (n) => Number(n).toLocaleString();

      const selectEl = container.querySelector("#deepseek-model-select");
      const familyEl = container.querySelector("#ds-family");
      const yearEl = container.querySelector("#ds-year");
      const totalEl = container.querySelector("#ds-total");
      const activeEl = container.querySelector("#ds-active");
      const attentionEl = container.querySelector("#ds-attention");
      const configGridEl = container.querySelector("#ds-config-grid");
      const tooltipEl = container.querySelector("#ds-tooltip");
      const legendItemsEl = container.querySelector("#ds-legend-items");
      const svg = d3.select(container.querySelector("#ds-parts-chart"));

      const color = d3.scaleOrdinal(d3.schemeTableau10);
      let models = [];
      let currentModel = null;

      const configLabelMap = {
        vocab_size: "Vocab Size",
        hidden_size: "Hidden Size",
        num_layers: "Layers",
        num_hidden_layers: "Layers",
        num_attention_heads: "Attention Heads",
        num_kv_heads: "KV Heads",
        num_key_value_heads: "KV Heads",
        head_dim: "Head Dim",
        intermediate_size: "Intermediate Size",
        context_length: "Context Length",
        max_position_embeddings: "Context Length",
        moe_experts: "MoE Experts",
        num_experts: "MoE Experts",
        activated_experts: "Activated Experts",
        num_experts_per_tok: "Experts/Tok",
        moe_intermediate_size: "MoE Intermediate",
        n_routed_experts: "Routed Experts",
        n_shared_experts: "Shared Experts",
        tie_word_embeddings: "Tie Embeddings",
      };

      const importantConfigKeys = new Set(Object.keys(configLabelMap));

      const formatConfigValue = (v) => {
        if (v === null || v === undefined) return "-";
        if (typeof v === "boolean") return v ? "Yes" : "No";
        if (typeof v === "number") return formatInt(v);
        return String(v);
      };

      const buildConfigGrid = (cfg) => {
        configGridEl.innerHTML = "";
        Object.entries(cfg || {}).forEach(([k, v]) => {
          if (!importantConfigKeys.has(k)) return;
          const item = document.createElement("div");
          item.className = "config-item";
          item.innerHTML = `
            <div class="config-key">${configLabelMap[k]}</div>
            <div class="config-value">${formatConfigValue(v)}</div>
          `;
          configGridEl.appendChild(item);
        });
      };

      const renderLegend = (parts) => {
        legendItemsEl.innerHTML = "";
        const total = d3.sum(parts, (p) => p.params_billion);
        parts.forEach((d) => {
          const item = document.createElement("span");
          item.className = "legend-item";
          item.dataset.name = d.name;
          const sw = document.createElement("span");
          sw.className = "legend-swatch";
          sw.style.background = color(d.name);
          const txt = document.createElement("span");
          txt.textContent = `${d.name} (${(d.params_billion / total * 100).toFixed(1)}%)`;
          item.appendChild(sw);
          item.appendChild(txt);

          item.addEventListener("mouseenter", () => {
            setHover(d.name);
          });
          item.addEventListener("mouseleave", () => {
            clearHover();
          });
          legendItemsEl.appendChild(item);
        });
      };

      const setHover = (name) => {
        container.classList.add("hovering");
        svg.selectAll(".bar").classed("ghost", (d) => d.name !== name);
        legendItemsEl.querySelectorAll(".legend-item").forEach((it) => {
          it.classList.toggle("ghost", it.dataset.name !== name);
        });
      };

      const clearHover = () => {
        container.classList.remove("hovering");
        svg.selectAll(".bar").classed("ghost", false);
        legendItemsEl.querySelectorAll(".legend-item").forEach((it) => {
          it.classList.remove("ghost");
        });
      };

      const renderChart = (parts) => {
        const width = container.clientWidth || 920;
        const margin = { top: 36, right: 24, bottom: 36, left: 140 };
        const barHeight = 34;
        const gap = 10;
        const innerHeight = parts.length * (barHeight + gap);
        const height = margin.top + margin.bottom + innerHeight;
        const innerWidth = width - margin.left - margin.right;

        svg.attr("width", width).attr("height", height).style("max-width", "100%");
        svg.selectAll("*").remove();

        // Drop shadow for bars
        const defs = svg.append("defs");
        const filter = defs.append("filter")
          .attr("id", "bar-shadow")
          .attr("x", "-10%").attr("y", "-10%")
          .attr("width", "120%").attr("height", "120%");
        filter.append("feDropShadow")
          .attr("dx", 0).attr("dy", 1)
          .attr("stdDeviation", 1.5)
          .attr("flood-opacity", 0.12);

        // Chart title
        svg.append("text")
          .attr("x", width / 2)
          .attr("y", 18)
          .attr("text-anchor", "middle")
          .attr("fill", "var(--text-color)")
          .style("font-size", "14px")
          .style("font-weight", "600")
          .style("font-family", "inherit")
          .text("Parameter Distribution by Component");

        const root = svg
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const xMax = d3.max(parts, (d) => d.params_billion) * 1.15;
        const x = d3
          .scaleLinear()
          .domain([0, xMax])
          .range([0, innerWidth]);

        const y = d3
          .scaleBand()
          .domain(parts.map((d) => d.name))
          .range([0, innerHeight])
          .paddingInner(0.22);

        color.domain(parts.map((d) => d.name));

        // Grid lines
        root
          .append("g")
          .call(d3.axisBottom(x).ticks(5).tickSize(-innerHeight).tickFormat(""))
          .selectAll("line")
          .attr("stroke", "var(--border-color)")
          .attr("stroke-dasharray", "3,3")
          .attr("opacity", 0.5);

        // X axis
        root
          .append("g")
          .attr("transform", `translate(0,${innerHeight})`)
          .call(d3.axisBottom(x).ticks(5).tickFormat((d) => `${d}B`))
          .attr("color", "var(--muted-color)")
          .style("font-size", "11px")
          .style("font-family", "inherit");

        // Y axis
        root
          .append("g")
          .call(d3.axisLeft(y))
          .selectAll("text")
          .attr("fill", "var(--text-color)")
          .style("font-size", "12px")
          .style("font-weight", "500")
          .style("font-family", "inherit");

        // Axis lines
        root.selectAll(".domain").attr("stroke", "var(--border-color)");

        // Bars
        const barGroup = root.append("g");
        barGroup
          .selectAll("rect")
          .data(parts, (d) => d.name)
          .join("rect")
          .attr("class", "bar")
          .attr("x", 0)
          .attr("y", (d) => y(d.name))
          .attr("height", y.bandwidth())
          .attr("rx", 6)
          .attr("ry", 6)
          .attr("fill", (d) => color(d.name))
          .attr("filter", "url(#bar-shadow)")
          .attr("data-name", (d) => d.name)
          .attr("width", 0)
          .on("mouseenter", (event, d) => {
            setHover(d.name);
            const total = d3.sum(parts, (p) => p.params_billion);
            tooltipEl.innerHTML = `
              <div style="font-weight:600;font-size:13px;margin-bottom:4px;">${d.name}</div>
              <div style="display:flex;justify-content:space-between;gap:12px;">
                <span>Parameters</span>
                <strong>${formatB(d.params_billion)}</strong>
              </div>
              <div style="display:flex;justify-content:space-between;gap:12px;">
                <span>Share</span>
                <strong>${(d.params_billion / total * 100).toFixed(1)}%</strong>
              </div>
              ${d.description ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border-color);color:var(--muted-color);font-size:11px;">${d.description}</div>` : ""}
            `;
            tooltipEl.style.opacity = "1";
          })
          .on("mousemove", (event) => {
            const [mx, my] = d3.pointer(event, tooltipEl.parentElement);
            const tw = tooltipEl.offsetWidth || 200;
            const th = tooltipEl.offsetHeight || 80;
            let ox = mx + 14;
            let oy = my + 14;
            if (ox + tw > container.clientWidth) ox = mx - tw - 14;
            if (oy + th > container.clientHeight) oy = my - th - 14;
            tooltipEl.style.transform = `translate(${Math.round(ox)}px,${Math.round(oy)}px)`;
          })
          .on("mouseleave", () => {
            clearHover();
            tooltipEl.style.opacity = "0";
            tooltipEl.style.transform = "translate(-9999px,-9999px)";
          })
          .transition()
          .duration(500)
          .delay((_, i) => i * 70)
          .attr("width", (d) => x(d.params_billion));

        // Bar value labels
        root
          .append("g")
          .selectAll("text")
          .data(parts, (d) => d.name)
          .join("text")
          .attr("x", (d) => {
            const bw = x(d.params_billion);
            return bw > 50 ? bw - 10 : bw + 8;
          })
          .attr("y", (d) => y(d.name) + y.bandwidth() / 2 + 4)
          .attr("fill", (d) => x(d.params_billion) > 50 ? "#fff" : "var(--text-color)")
          .attr("text-anchor", (d) => x(d.params_billion) > 50 ? "end" : "start")
          .style("font-size", "12px")
          .style("font-weight", "600")
          .style("font-family", "inherit")
          .style("pointer-events", "none")
          .text((d) => formatB(d.params_billion))
          .attr("opacity", 0)
          .transition()
          .duration(350)
          .delay((_, i) => 520 + i * 70)
          .attr("opacity", 1);

        renderLegend(parts);
      };

      const renderModel = (modelName) => {
        currentModel = models.find((m) => m.model === modelName) || models[0] || null;
        if (!currentModel) return;

        familyEl.textContent = currentModel.family || "-";
        yearEl.textContent = String(currentModel.year || "-");
        totalEl.textContent = formatB(currentModel.total_params_billion || 0);
        activeEl.textContent = formatB(currentModel.active_params_billion || 0);
        attentionEl.textContent = currentModel.attention || "-";
        buildConfigGrid(currentModel.config || {});
        renderChart(currentModel.parts || []);
      };

      const populateSelect = () => {
        selectEl.innerHTML = "";
        models.forEach((m) => {
          const option = document.createElement("option");
          option.value = m.model;
          option.textContent = m.model;
          selectEl.appendChild(option);
        });
        if (models.length) renderModel(models[0].model);
      };

      selectEl.addEventListener("change", () => renderModel(selectEl.value));

      const rerender = () => {
        if (currentModel) renderChart(currentModel.parts || []);
      };

      // Resolve data source: data-datafiles attribute, then fallback
      let mountEl = container;
      while (mountEl && !mountEl.getAttribute?.('data-datafiles')) {
        mountEl = mountEl.parentElement;
      }
      const dataAttr = mountEl?.getAttribute?.('data-datafiles') || '';
      let dataSources = [];
      try {
        const parsed = JSON.parse(dataAttr);
        dataSources = Array.isArray(parsed) ? parsed : [String(parsed)];
      } catch {
        dataSources = dataAttr ? [dataAttr] : [];
      }

      const ensureDataPrefix = (p) =>
        typeof p === 'string' && p ? (p.includes('/') ? p : `/data/${p}`) : p;

      const fetchFirstAvailable = async (paths) => {
        for (const p of paths) {
          try {
            const r = await fetch(p, { cache: 'no-cache' });
            if (r.ok) return await r.json();
          } catch (_) {}
        }
        throw new Error('No data file could be loaded');
      };

      const defaultPaths = [
        "/data/deepseek-series-configs.json",
        "./assets/data/deepseek-series-configs.json",
        "../assets/data/deepseek-series-configs.json",
      ];

      const paths = dataSources.length > 0
        ? dataSources.map(ensureDataPrefix)
        : defaultPaths;

      fetchFirstAvailable(paths)
        .then((data) => {
          models = Array.isArray(data) ? data : [];
          populateSelect();
        })
        .catch(() => {
          container.innerHTML = "<p>Failed to load configuration data.</p>";
        });

      if (window.ResizeObserver) {
        const ro = new ResizeObserver(() => rerender());
        ro.observe(container);
      } else {
        window.addEventListener("resize", rerender);
      }
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => ensureD3(bootstrap), {
        once: true,
      });
    } else {
      ensureD3(bootstrap);
    }
  })();
</script>
