<div class="minicpm5-opd-response-length"></div>
<style>
  .minicpm5-opd-response-length {
    position: relative;
    max-width: 100%;
    overflow-x: auto;
  }

  .minicpm5-opd-response-length .title {
    font-size: 24px;
    font-weight: 700;
    fill: #000000;
    text-anchor: middle;
  }

  .minicpm5-opd-response-length .category-label {
    font-size: 13px;
    font-style: italic;
    fill: #afafaf;
    text-anchor: middle;
  }

  .minicpm5-opd-response-length .axis-label {
    font-size: 15px;
    fill: #000000;
    text-anchor: middle;
  }

  .minicpm5-opd-response-length .tick text {
    font-size: 12px;
    fill: #333333;
  }

  .minicpm5-opd-response-length .x-axis-tick {
    font-size: 12px;
    font-weight: 500;
    fill: #333333;
  }

  .minicpm5-opd-response-length .grid-line {
    stroke: #f3f3f3;
    stroke-dasharray: 3, 3;
  }

  .minicpm5-opd-response-length .divider-line {
    stroke: #b5b5b5;
    stroke-dasharray: 2, 2;
    stroke-width: 1.5px;
  }

  .minicpm5-opd-response-length .bar-label {
    font-size: 11px;
    fill: #555555;
    text-anchor: middle;
    pointer-events: none;
  }

  .minicpm5-opd-response-length .drop-label {
    font-size: 13px;
    font-weight: 700;
    fill: #e65c00;
    text-anchor: start;
    pointer-events: none;
  }

  .minicpm5-opd-response-length .legend-text {
    font-size: 14px;
    fill: #000000;
  }

  .minicpm5-opd-response-length .ghost {
    opacity: 0.2;
    transition: opacity 0.15s ease;
  }

  .minicpm5-opd-response-length .bar-group {
    transition: opacity 0.15s ease;
  }

  .minicpm5-opd-response-length .d3-tooltip {
    position: absolute;
    top: 0;
    left: 0;
    transform: translate(-9999px, -9999px);
    pointer-events: none;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid #e0e0e0;
    background: #ffffff;
    color: #000000;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    opacity: 0;
    transition: opacity 0.15s ease;
    text-align: left;
    z-index: 100;
  }

  .minicpm5-opd-response-length .d3-tooltip strong {
    font-weight: 700;
  }

  .minicpm5-opd-response-length .d3-tooltip .tip-sft {
    color: #1976d2;
  }

  .minicpm5-opd-response-length .d3-tooltip .tip-rl {
    color: #7b1fa2;
  }

  .minicpm5-opd-response-length .d3-tooltip .tip-drop {
    color: #e65c00;
  }

  .minicpm5-opd-response-length .legend-item {
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
</style>
<script>
(() => {
  const ensureD3 = (cb) => {
    if (window.d3 && typeof window.d3.select === 'function') return cb();
    let s = document.getElementById('d3-cdn-script');
    if (!s) {
      s = document.createElement('script');
      s.id = 'd3-cdn-script';
      s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
      document.head.appendChild(s);
    }
    const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
    s.addEventListener('load', onReady, { once: true });
    if (window.d3) onReady();
  };

  const bootstrap = () => {
    const scriptEl = document.currentScript;
    let container = scriptEl ? scriptEl.previousElementSibling : null;
    if (!(container && container.classList && container.classList.contains('minicpm5-opd-response-length'))) {
      const cs = Array.from(document.querySelectorAll('.minicpm5-opd-response-length')).filter(el => !(el.dataset && el.dataset.mounted==='true'));
      container = cs[cs.length-1] || null;
    }
    if (!container) return;
    if (container.dataset) { if (container.dataset.mounted==='true') return; container.dataset.mounted='true'; }

    const data = [
      { benchmark: "AIME-2025", category: "Math", sft: 42.3, rl: 9.6, drop: -32.7, labelOffset: { x: 10, y: 110 } },
      { benchmark: "AIME-2026", category: "Math", sft: 38.1, rl: 7.7, drop: -30.4, labelOffset: { x: 10, y: 100 } },
      { benchmark: "HMMT Feb 2026", category: "Math", sft: 47.7, rl: 7.2, drop: -40.5, labelOffset: { x: 10, y: 130 } },
      { benchmark: "LCB-v6", category: "Code", sft: 37.0, rl: 8.0, drop: -29.0, labelOffset: { x: 10, y: 95 } },
      { benchmark: "LCB-Pro Easy", category: "Code", sft: 50.5, rl: 16.5, drop: -34.0, labelOffset: { x: 10, y: 110 } },
      { benchmark: "IFEval", category: "Instruction Following", sft: 3.7, rl: 1.9, drop: -1.9, labelOffset: { x: 12, y: -5 } },
      { benchmark: "IFBench", category: "Instruction Following", sft: 20.5, rl: 7.4, drop: -13.1, labelOffset: { x: 10, y: 40 } },
      { benchmark: "Multi-IF", category: "Instruction Following", sft: 1.3, rl: 0.6, drop: -0.7, labelOffset: { x: 12, y: -5 } },
    ];

    const width = 1000;
    const height = 520;
    const margin = { top: 60, right: 20, bottom: 90, left: 65 };
    const colorSFT = "#1976d2";
    const colorRL = "#7b1fa2";
    const colorArrow = "#e65c00";

    let tip = container.querySelector('.d3-tooltip');
    let tipInner;
    if (!tip) {
      tip = document.createElement('div'); tip.className = 'd3-tooltip';
      tipInner = document.createElement('div'); tipInner.className = 'd3-tooltip__inner'; tip.appendChild(tipInner);
      container.appendChild(tip);
    } else {
      tipInner = tip.querySelector('.d3-tooltip__inner') || tip;
    }

    function showTip(html, x, y) {
      tip.style.transform = `translate(${x + 12}px, ${y + 12}px)`;
      tip.style.opacity = "1";
      tipInner.innerHTML = html;
    }

    function hideTip() {
      tip.style.opacity = "0";
      tip.style.transform = "translate(-9999px, -9999px)";
    }

    const svg = d3.select(container)
      .append("svg")
      .attr("width", width)
      .attr("height", height)
      .style("display", "block");

    const xScale = d3
      .scaleBand()
      .domain(data.map(d => d.benchmark))
      .range([margin.left, width - margin.right])
      .padding(0.4);

    const xSubScale = d3
      .scaleBand()
      .domain(["sft", "rl"])
      .range([0, xScale.bandwidth()])
      .padding(0.05);

    const yScale = d3
      .scaleLinear()
      .domain([0, 55])
      .range([height - margin.bottom, margin.top + 20]);

    const yTicks = [10, 20, 30, 40, 50];
    svg
      .selectAll(".grid-line")
      .data(yTicks)
      .enter()
      .append("line")
      .attr("class", "grid-line")
      .attr("x1", margin.left)
      .attr("x2", width - margin.right)
      .attr("y1", d => yScale(d))
      .attr("y2", d => yScale(d));

    svg
      .append("defs")
      .append("marker")
      .attr("id", "arrow")
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 5)
      .attr("refY", 5)
      .attr("markerWidth", 6)
      .attr("markerHeight", 6)
      .attr("orient", "auto-start-reverse")
      .append("path")
      .attr("d", "M 0 0 L 10 5 L 0 10 z")
      .attr("fill", colorArrow);

    const barGroups = svg
      .selectAll(".bar-group")
      .data(data)
      .enter()
      .append("g")
      .attr("class", "bar-group")
      .attr("transform", d => `translate(${xScale(d.benchmark)},0)`);

    function highlight(activeBenchmark) {
      barGroups.classed("ghost", d => d.benchmark !== activeBenchmark);
    }

    function clearHighlight() {
      barGroups.classed("ghost", false);
    }

    const tipHTML = (d) =>
      `<strong>${d.benchmark}</strong><br/>
       <span class="tip-sft">SFT: <strong>${d.sft.toFixed(1)}%</strong></span><br/>
       <span class="tip-rl">RL + OPD: <strong>${d.rl.toFixed(1)}%</strong></span><br/>
       <span class="tip-drop">Drop: <strong>${d.drop.toFixed(1)} pp</strong></span>`;

    barGroups
      .append("rect")
      .attr("class", "bar-sft")
      .attr("x", xSubScale("sft"))
      .attr("y", height - margin.bottom)
      .attr("width", xSubScale.bandwidth())
      .attr("height", 0)
      .attr("fill", colorSFT)
      .on("mouseenter", (event, d) => { highlight(d.benchmark); const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mousemove", (event, d) => { const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mouseleave", () => { clearHighlight(); hideTip(); })
      .transition()
      .duration(400)
      .delay((d, i) => i * 80)
      .attr("y", d => yScale(d.sft))
      .attr("height", d => yScale(0) - yScale(d.sft));

    barGroups
      .append("rect")
      .attr("class", "bar-rl")
      .attr("x", xSubScale("rl"))
      .attr("y", height - margin.bottom)
      .attr("width", xSubScale.bandwidth())
      .attr("height", 0)
      .attr("fill", colorRL)
      .on("mouseenter", (event, d) => { highlight(d.benchmark); const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mousemove", (event, d) => { const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mouseleave", () => { clearHighlight(); hideTip(); })
      .transition()
      .duration(400)
      .delay((d, i) => i * 80 + 200)
      .attr("y", d => yScale(d.rl))
      .attr("height", d => yScale(0) - yScale(d.rl));

    barGroups
      .append("text")
      .attr("class", "bar-label")
      .attr("x", xSubScale("sft") + xSubScale.bandwidth() / 2)
      .attr("y", d => yScale(d.sft) - 6)
      .text(d => d.sft.toFixed(1));

    barGroups
      .append("text")
      .attr("class", "bar-label")
      .attr("x", xSubScale("rl") + xSubScale.bandwidth() / 2)
      .attr("y", d => yScale(d.rl) - 6)
      .text(d => d.rl.toFixed(1));

    barGroups
      .append("line")
      .attr("class", "arrow-line")
      .attr("x1", xSubScale("rl") + xSubScale.bandwidth() + 8)
      .attr("x2", xSubScale("rl") + xSubScale.bandwidth() + 8)
      .attr("y1", d => (d.sft > 5 ? yScale(d.sft) - 2 : yScale(d.sft)))
      .attr("y2", d => (d.sft > 5 ? yScale(d.rl) + 10 : yScale(d.rl) + 2))
      .attr("stroke", colorArrow)
      .attr("stroke-width", 2)
      .attr("marker-end", "url(#arrow)")
      .on("mouseenter", (event, d) => { highlight(d.benchmark); const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mousemove", (event, d) => { const [mx, my] = d3.pointer(event, container); showTip(tipHTML(d), mx, my); })
      .on("mouseleave", () => { clearHighlight(); hideTip(); });

    barGroups
      .append("text")
      .attr("class", "drop-label")
      .attr("x", xSubScale("rl") + xSubScale.bandwidth() + 16)
      .attr("y", d => yScale(d.sft) + d.labelOffset.y)
      .text(d => `${d.drop.toFixed(1)} pp`);

    svg
      .append("line")
      .attr("x1", margin.left)
      .attr("x2", width - margin.right)
      .attr("y1", height - margin.bottom)
      .attr("y2", height - margin.bottom)
      .attr("stroke", "#333")
      .attr("stroke-width", 1.2);

    const yAxis = d3.axisLeft(yScale).tickValues([0, 10, 20, 30, 40, 50]).tickSize(5);
    svg
      .append("g")
      .attr("transform", `translate(${margin.left},0)`)
      .call(yAxis)
      .call(g => g.select(".domain").remove())
      .call(g => g.selectAll(".tick line").attr("stroke", "#333"));

    svg
      .append("text")
      .attr("class", "axis-label")
      .attr("transform", "rotate(-90)")
      .attr("x", -(height - margin.bottom + margin.top) / 2)
      .attr("y", 22)
      .text("Responses Hitting max_tokens (%)");

    svg
      .append("g")
      .selectAll(".x-axis-tick")
      .data(data)
      .enter()
      .append("text")
      .attr("class", "x-axis-tick")
      .attr("transform", d => {
        const x = xScale(d.benchmark) + xScale.bandwidth() / 2;
        const y = height - margin.bottom + 20;
        return `translate(${x}, ${y}) rotate(-18)`;
      })
      .attr("text-anchor", "end")
      .text(d => d.benchmark);

    const xMathEnd = (xScale(data[2].benchmark) + xScale.bandwidth() + xScale(data[3].benchmark)) / 2;
    const xCodeEnd = (xScale(data[4].benchmark) + xScale.bandwidth() + xScale(data[5].benchmark)) / 2;

    svg
      .append("line")
      .attr("class", "divider-line")
      .attr("x1", xMathEnd)
      .attr("x2", xMathEnd)
      .attr("y1", margin.top + 15)
      .attr("y2", height - margin.bottom);

    svg
      .append("line")
      .attr("class", "divider-line")
      .attr("x1", xCodeEnd)
      .attr("x2", xCodeEnd)
      .attr("y1", margin.top + 15)
      .attr("y2", height - margin.bottom);

    svg
      .append("text")
      .attr("class", "category-label")
      .attr("x", (margin.left + xMathEnd) / 2)
      .attr("y", margin.top + 30)
      .text("Math");

    svg
      .append("text")
      .attr("class", "category-label")
      .attr("x", (xMathEnd + xCodeEnd) / 2)
      .attr("y", margin.top + 30)
      .text("Code");

    svg
      .append("text")
      .attr("class", "category-label")
      .attr("x", (xCodeEnd + width - margin.right) / 2)
      .attr("y", margin.top + 30)
      .text("Instruction Following");

    svg
      .append("text")
      .attr("class", "title")
      .attr("x", width / 2)
      .attr("y", margin.top - 15)
      .text("Overlong Response Rate Drop");

    const legendG = svg.append("g").attr("class", "legend");

    const legendItems = [
      { label: "SFT", color: colorSFT, cls: "bar-sft" },
      { label: "RL + OPD", color: colorRL, cls: "bar-rl" },
    ];

    const legendXStart = width / 2 - 100;
    const legendY = height - 24;

    legendItems.forEach((item, i) => {
      const xOff = i * 170;
      const g = legendG
        .append("g")
        .attr("class", "legend-item")
        .attr("transform", `translate(${legendXStart + xOff}, ${legendY})`);

      g.append("rect")
        .attr("width", 26)
        .attr("height", 15)
        .attr("fill", item.color)
        .attr("rx", 2);

      g.append("text")
        .attr("x", 35)
        .attr("y", 13)
        .attr("class", "legend-text")
        .style("font-size", "14px")
        .style("fill", "#000000")
        .text(item.label);

      g.on("mouseenter", () => {
        const cls = item.cls;
        svg.selectAll(".bar-sft").classed("ghost", cls !== "bar-sft");
        svg.selectAll(".bar-rl").classed("ghost", cls !== "bar-rl");
      });
      g.on("mouseleave", () => {
        svg.selectAll(".bar-sft").classed("ghost", false);
        svg.selectAll(".bar-rl").classed("ghost", false);
      });
    });
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true });
  } else {
    ensureD3(bootstrap);
  }
})();
</script>
